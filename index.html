<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerelt Solutions</title>

<!-- SEO -->
<meta name="description" content="График дизайн, вэб сайт, маркетингийн үйлчилгээ">
<meta name="keywords" content="design, website, marketing mongolia">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --blue:#3b82f6;
  --cyan:#06b6d4;
  --text:#e2e8f0;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
.nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  backdrop-filter:blur(12px);
  background:rgba(2,6,23,0.6);
  z-index:1000;
}

.nav a{
  margin-left:25px;
  text-decoration:none;
  color:#94a3b8;
  position:relative;
}

/* underline */
.nav a::after{
  content:'';
  position:absolute;
  left:0;
  bottom:-3px;
  width:0;
  height:2px;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  transition:.3s;
}
.nav a:hover::after{width:100%;}
.nav a:hover{color:white}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:70px;
  font-weight:900;
}

/* SERVICES */
.services{
  padding:100px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:.4s;
}
.card:hover img{transform:scale(1.1);}

/* FORM */
.form-box{
  max-width:420px;
  margin:40px auto;
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
}

.form-box input,
.form-box textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

.cta2{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  color:white;
  cursor:pointer;
}

/* STATUS */
.status{
  text-align:center;
  margin-top:10px;
  font-size:14px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <b>Gerelt Solutions</b>
  <div>
    <a href="#">Нүүр</a>
    <a href="#services">Үйлчилгээ</a>
    <a href="#contact">Холбоо</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>ТАНЫ АМАР ШИЙДЭЛ</h1>
</section>

<!-- SERVICES -->
<section class="services" id="services">
  <h2 style="text-align:center;margin-bottom:30px;">Манай үйлчилгээ</h2>

  <div class="grid">

    <a href="https://example.com/design" target="_blank">
      <div class="card">
        <img src="service1.jpg">
      </div>
    </a>

    <a href="https://example.com/media" target="_blank">
      <div class="card">
        <img src="service2.jpg">
      </div>
    </a>

    <div class="card">
      <img src="service3.jpg">
    </div>

    <div class="card">
      <img src="service4.jpg">
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2 style="text-align:center">Холбоо барих</h2>

  <form id="contactForm" class="form-box">
    <input type="text" name="name" placeholder="Нэр" required>
    <input type="text" name="phone" placeholder="Утас" required>
    <input type="email" name="email" placeholder="Имэйл">
    <textarea name="message" placeholder="Мессеж"></textarea>

    <button class="cta2">Илгээх</button>

    <div class="status" id="status"></div>
  </form>
</section>

<!-- FOOTER -->
<div style="text-align:center;padding:20px;color:#777">
© 2026 Gerelt Solutions
</div>

<script>

/* SCROLL */
function scrollToContact(){
  document.getElementById('contact').scrollIntoView({behavior:'smooth'});
}

/* FORM */
const scriptURL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

document.getElementById("contactForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerText = "Илгээж байна...";

  const formData = new FormData(this);

  try{
    await fetch(scriptURL,{
      method:"POST",
      body:formData
    });

    status.innerText = "Амжилттай илгээгдлээ!";
    this.reset();
  }catch(err){
    status.innerText = "Алдаа гарлаа!";
  }
});

/* FIXED PARALLAX */
const hero = document.querySelector('.hero');

hero.addEventListener('mousemove',(e)=>{
  const x=(e.clientX/window.innerWidth-0.5)*10;
  const y=(e.clientY/window.innerHeight-0.5)*10;
  hero.style.transform = `translate(${x}px, ${y}px)`;
});

</script>

<!-- FB CHAT -->
<div id="fb-root"></div>
<div id="fb-customer-chat" class="fb-customerchat"></div>

<script>
var chatbox = document.getElementById('fb-customer-chat');
chatbox.setAttribute("page_id", "YOUR_PAGE_ID");

window.fbAsyncInit = function () {
  FB.init({xfbml:true,version:'v18.0'});
};

(function(d,s,id){
var js,fjs=d.getElementsByTagName(s)[0];
if(d.getElementById(id)) return;
js=d.createElement(s);js.id=id;
js.src='https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js';
fjs.parentNode.insertBefore(js,fjs);
}(document,'script','facebook-jssdk'));
</script>

</body>
</html>
